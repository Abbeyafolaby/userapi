spring.application.name=userapi [DEV]
logging.level.com.learn.userapi=DEBUG

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/userapi_db
spring.datasource.username=userapi_user
spring.datasource.password=userapi_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging for SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Spring Security
spring.security.user.name=dev
spring.security.user.password=dev

# JWT Configuration
app.jwt.secret=3d8f2a1b9c4e7f0d6a5b2c8e1f4d7a0b3e6c9f2a5d8b1e4f7a0c3d6e9b2f5a8c
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Cookie configuration
app.cookie.secure=false
app.cookie.same-site=Strict
app.cookie.domain=localhost
app.cookie.access-token-name=accessToken
app.cookie.refresh-token-name=refreshToken

# Redis connection
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Spring Cache — use Redis as the cache provider
spring.cache.type=redis

# Default TTL for all caches — 10 minutes
spring.cache.redis.time-to-live=600000

# Store cache keys with a human-readable prefix
spring.cache.redis.key-prefix=userapi:

# Don't cache null values — a null result means "not found", not "cache this"
spring.cache.redis.cache-null-values=false